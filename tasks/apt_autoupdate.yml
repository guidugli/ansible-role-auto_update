---
- name: Gather package facts when auto update is disabled
  ansible.builtin.package_facts:
    manager: auto
  when: not au_enable_auto_update

- name: Record unattended-upgrades package presence
  ansible.builtin.set_fact:
    au_auto_update_pkg_installed: "{{ 'unattended-upgrades' in ansible_facts.get('packages', {}) }}"
  when: not au_enable_auto_update

- name: Install unattended-upgrades package
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true
  when: au_enable_auto_update

- name: Manage unattended-upgrades service enablement
  ansible.builtin.systemd_service:
    name: unattended-upgrades.service
    enabled: "{{ au_enable_auto_update }}"
  when:
    - ansible_facts.get('service_mgr', '') == 'systemd'
    - au_enable_auto_update or (au_auto_update_pkg_installed | default(false))

- name: Deploy apt automatic update configuration files
  ansible.builtin.template:
    src: "{{ ansible_facts['distribution'] }}/{{ item }}"
    dest: "/etc/apt/apt.conf.d/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - 20auto-upgrades
    - 50unattended-upgrades
