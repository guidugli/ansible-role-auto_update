---
# tasks/dnf5_autoupdate.yml

- name: Gather package facts when auto update is disabled
  ansible.builtin.package_facts:
    manager: auto
  when: not au_enable_auto_update

- name: Record dnf5 automatic plugin presence
  ansible.builtin.set_fact:
    au_auto_update_pkg_installed: "{{ 'dnf5-plugin-automatic' in ansible_facts.get('packages', {}) }}"
  when: not au_enable_auto_update

- name: Install dnf5 automatic plugin
  ansible.builtin.package:
    name: dnf5-plugin-automatic
    state: present
  when: au_enable_auto_update

- name: Enable or disable dnf5 automatic timer
  ansible.builtin.systemd_service:
    name: dnf5-automatic.timer
    state: "{{ 'started' if au_enable_auto_update else 'stopped' }}"
    enabled: "{{ au_enable_auto_update }}"
  when: au_enable_auto_update or (au_auto_update_pkg_installed | default(false))

- name: Deploy dnf5 automatic configuration
  ansible.builtin.template:
    src: automatic.conf
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: '0644'
  when: au_enable_auto_update
  notify: Restart dnf5-automatic service
