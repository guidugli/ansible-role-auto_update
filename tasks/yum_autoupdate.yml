---
# tasks/yum_autoupdate.yml
# Legacy backend retained for completeness even though current supported matrix uses apt/dnf/dnf5.

- name: Gather package facts when auto update is disabled
  ansible.builtin.package_facts:
    manager: auto
  when: not au_enable_auto_update

- name: Record yum-cron package presence
  ansible.builtin.set_fact:
    au_auto_update_pkg_installed: "{{ 'yum-cron' in ansible_facts.get('packages', {}) }}"
  when: not au_enable_auto_update

- name: Install yum-cron package
  ansible.builtin.package:
    name: yum-cron
    state: present
  when: au_enable_auto_update

- name: Enable or disable yum-cron service
  ansible.builtin.systemd_service:
    name: yum-cron.service
    state: "{{ 'started' if au_enable_auto_update else 'stopped' }}"
    enabled: "{{ au_enable_auto_update }}"
  when: au_enable_auto_update or (au_auto_update_pkg_installed | default(false))

- name: Configure yum-cron
  community.general.ini_file:
    path: /etc/yum/yum-cron.conf
    section: "{{ item.section }}"
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    mode: '0644'
  loop:
    - { section: 'commands', key: 'upgrade_cmd', value: "{{ 'security' if au_security_only else 'default' }}" }
    - { section: 'commands', key: 'download_updates', value: 'yes' }
    - { section: 'commands', key: 'apply_updates', value: "{{ 'no' if au_download_only else 'yes' }}" }
    - { section: 'emitters', key: 'emit_via', value: "{{ au_emit_via | default('stdio') }}" }
    - { section: 'email', key: 'email_from', value: "{{ au_email_from }}" }
    - { section: 'email', key: 'email_to', value: "{{ au_email_to | default('root') }}" }
    - { section: 'email', key: 'email_host', value: "{{ au_email_server | default('localhost') }}" }
  notify: Restart yum-cron service
  when: au_enable_auto_update
