---
- name: Gather package facts when auto update is disabled
  ansible.builtin.package_facts:
    manager: auto
  when: not au_enable_auto_update

- name: Record dnf-automatic package presence
  ansible.builtin.set_fact:
    au_auto_update_pkg_installed: "{{ 'dnf-automatic' in ansible_facts.get('packages', {}) }}"
  when: not au_enable_auto_update

- name: Install dnf-automatic package
  ansible.builtin.package:
    name: dnf-automatic
    state: present
  when: au_enable_auto_update

- name: Manage dnf-automatic timer enablement
  ansible.builtin.systemd_service:
    name: dnf-automatic.timer
    enabled: "{{ au_enable_auto_update }}"
  when:
    - ansible_facts.get('service_mgr', '') == 'systemd'
    - au_enable_auto_update or (au_auto_update_pkg_installed | default(false))

- name: Deploy dnf automatic configuration
  ansible.builtin.template:
    src: automatic.conf
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: '0644'
  when: au_enable_auto_update
  notify: Restart dnf-automatic service

- name: Ensure dnf-automatic timer override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic.timer.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - ansible_facts.get('service_mgr', '') == 'systemd'
    - au_enable_auto_update
    - au_manage_schedule | bool

- name: Deploy dnf-automatic timer override
  ansible.builtin.template:
    src: systemd_timer_override.conf.j2
    dest: /etc/systemd/system/dnf-automatic.timer.d/override.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - ansible_facts.get('service_mgr', '') == 'systemd'
    - au_enable_auto_update
    - au_manage_schedule | bool
  notify:
    - Reload systemd
    - Restart dnf-automatic service

- name: Remove dnf-automatic timer override when schedule management is disabled
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic.timer.d/override.conf
    state: absent
  when:
    - ansible_facts.get('service_mgr', '') == 'systemd'
    - not (au_manage_schedule | bool)
  notify:
    - Reload systemd
    - Restart dnf-automatic service

- name: Remove empty dnf-automatic timer override directory when schedule management is disabled
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic.timer.d
    state: absent
  when:
    - ansible_facts.get('service_mgr', '') == 'systemd'
    - not (au_manage_schedule | bool)
