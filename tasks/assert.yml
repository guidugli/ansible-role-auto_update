---
# Semantic validation beyond argument_specs.yml.

- name: Ensure optional string variables are not whitespace-only when provided
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.vars', item.name) | string | trim | length) > 0
    fail_msg: "{{ item.name }} must not be whitespace-only when provided."
    quiet: true
  loop:
    - { name: 'au_email_to' }
    - { name: 'au_command_format' }
    - { name: 'au_stdin_format' }
    - { name: 'au_email_server' }
    - { name: 'au_system_name' }
    - { name: 'au_syslog_facility' }
  when:
    - lookup('ansible.builtin.vars', item.name, default='') | string | length > 0

- name: Ensure au_reboot_time format is valid
  ansible.builtin.assert:
    that:
      - au_reboot_time is regex('^(?:now|(?:[01][0-9]|2[0-3]):[0-5][0-9])$')
    fail_msg: "au_reboot_time must be 'now' or in HH:MM format."
    quiet: true

- name: Ensure timer schedule is provided when schedule management is enabled
  ansible.builtin.assert:
    that:
      - (au_timer_on_calendar | string | trim | length) > 0
    fail_msg: "au_timer_on_calendar must be a non-empty string when au_manage_schedule is true."
    quiet: true
  when: au_manage_schedule | bool

- name: Ensure randomized delay is not whitespace-only when provided
  ansible.builtin.assert:
    that:
      - (au_timer_randomized_delay_sec | string | trim | length) > 0
    fail_msg: "au_timer_randomized_delay_sec must not be whitespace-only when provided."
    quiet: true
  when: au_timer_randomized_delay_sec | string | length > 0

- name: Ensure schedule management is only used on dnf or dnf5 systems
  ansible.builtin.assert:
    that:
      - ansible_facts.get('pkg_mgr', '') in ['dnf', 'dnf5']
    fail_msg: "au_manage_schedule is currently supported only on dnf and dnf5 systems."
    quiet: true
  when: au_manage_schedule | bool
