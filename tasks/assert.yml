---
# tasks/assert.yml
# Extra validation not fully covered by meta/argument_specs.yml.

- name: Ensure au_email_to is a non-empty string when defined
  ansible.builtin.assert:
    that:
      - au_email_to is string
      - au_email_to | length > 0
    fail_msg: au_email_to must be a non-empty string.
    quiet: true
  when: au_email_to is defined

- name: Ensure optional string variables are non-empty when defined
  ansible.builtin.assert:
    that:
      - lookup('vars', item) is string
      - lookup('vars', item) | length > 0
    fail_msg: "{{ item }} must be a non-empty string when defined."
    quiet: true
  loop:
    - au_command_format
    - au_stdin_format
    - au_email_server
    - au_system_name
    - au_syslog_facility
  when: lookup('vars', item, default=omit) is not sameas omit

- name: Ensure au_reboot_time format is valid when defined
  ansible.builtin.assert:
    that:
      - au_reboot_time is regex('^(?:now|[0-2][0-9]:[0-5][0-9])$')
    fail_msg: au_reboot_time must be 'now' or in HH:MM format.
    quiet: true
  when: au_reboot_time is defined

- name: Ensure au_automatic_reboot dependencies are valid
  ansible.builtin.assert:
    that:
      - au_reboot_time is not defined or (au_reboot_time is string and au_reboot_time | length > 0)
    fail_msg: au_reboot_time must be a non-empty string when defined.
    quiet: true
  when: au_automatic_reboot | default(false)
