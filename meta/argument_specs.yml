---
argument_specs:
  main:
    short_description: Install and configure automatic package update tooling
    description:
      - Install and configure unattended package update tooling on Debian, Ubuntu, Fedora, and legacy yum-based systems.
    options:
      au_enable_auto_update:
        type: bool
        required: false
        default: true

      au_security_only:
        type: bool
        required: false
        default: true

      au_email_from:
        type: str
        required: false
        default: root

      au_email_to:
        type: str
        required: false
        default: ''

      au_download_only:
        type: bool
        required: false
        default: false

      au_emit_via:
        type: str
        required: false
        default: stdio
        choices:
          - stdio
          - email
          - motd

      au_command_format:
        type: str
        required: false
        default: ''

      au_stdin_format:
        type: str
        required: false
        default: ''

      au_email_server:
        type: str
        required: false
        default: localhost

      au_system_name:
        type: str
        required: false
        default: ''

      au_redhat_reboot:
        type: str
        required: false
        default: never
        choices:
          - never
          - when-changed
          - when-needed

      au_manage_schedule:
        type: bool
        required: false
        default: false

      au_timer_on_calendar:
        type: str
        required: false
        default: ''

      au_timer_randomized_delay_sec:
        type: str
        required: false
        default: ''

      au_timer_persistent:
        type: bool
        required: false
        default: true

      au_mail_report:
        type: str
        required: false
        default: only-on-error
        choices:
          - always
          - only-on-error
          - on-change

      au_remove_old_kernel:
        type: bool
        required: false
        default: true

      au_remove_new_unused_dependencies:
        type: bool
        required: false
        default: true

      au_remove_unused_dependencies:
        type: bool
        required: false
        default: false

      au_automatic_reboot:
        type: bool
        required: false
        default: false

      au_reboot_with_users:
        type: bool
        required: false
        default: true

      au_reboot_time:
        type: str
        required: false
        default: '02:00'

      au_syslog_enable:
        type: bool
        required: false
        default: false

      au_syslog_facility:
        type: str
        required: false
        default: daemon
