---
argument_specs:
  main:
    short_description: Install and configure automatic package updates
    description:
      - Install and configure unattended package update tooling on Debian, Ubuntu, and Fedora systems.
    options:
      au_enable_auto_update:
        type: bool
        required: false
        default: true
      au_security_only:
        type: bool
        required: false
        default: true
      au_email_from:
        type: str
        required: false
        default: root
      au_email_to:
        type: str
        required: false
      au_download_only:
        type: bool
        required: false
        default: false
      au_emit_via:
        type: str
        required: false
        choices: [stdio, email, motd]
      au_command_format:
        type: str
        required: false
      au_stdin_format:
        type: str
        required: false
      au_email_server:
        type: str
        required: false
      au_system_name:
        type: str
        required: false
      au_redhat_reboot:
        type: str
        required: false
        choices: [never, when-changed, when-needed]
      au_manage_schedule:
        type: bool
        required: false
        default: false
      au_timer_on_calendar:
        type: str
        required: false
        default: ""
      au_timer_randomized_delay_sec:
        type: str
        required: false
        default: ""
      au_timer_persistent:
        type: bool
        required: false
        default: true
      au_mail_report:
        type: str
        required: false
        choices: [always, only-on-error, on-change]
      au_remove_old_kernel:
        type: bool
        required: false
      au_remove_new_unused_dependencies:
        type: bool
        required: false
        default: true
      au_remove_unused_dependencies:
        type: bool
        required: false
        default: false
      au_automatic_reboot:
        type: bool
        required: false
      au_reboot_with_users:
        type: bool
        required: false
      au_reboot_time:
        type: str
        required: false
      au_syslog_enable:
        type: bool
        required: false
      au_syslog_facility:
        type: str
        required: false
